name: Build and Create Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-release:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - uses: BradyAJohnston/setup-blender@v5
        with:
          version: 5.2

      - name: Validate and build extension
        run: |
          mkdir -p dist
          blender --command extension validate nodebpy_export
          blender --command extension build --source-dir nodebpy_export --output-dir dist

      - name: Create release
        run: |
          gh release create "${{ github.ref_name }}" --generate-notes dist/*.zip
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Trigger website rebuild
        env:
          CF_DEPLOY_HOOK_URL: ${{ secrets.CF_DEPLOY_HOOK_URL }}
        run: |
          if [ -n "$CF_DEPLOY_HOOK_URL" ]; then
            curl -X POST "$CF_DEPLOY_HOOK_URL"
          else
            echo "CF_DEPLOY_HOOK_URL not set; skipping website rebuild trigger."
          fi
